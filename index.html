<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tebak Kata Reborn - Online Lobby</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.300.0/dist/umd/lucide.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ⚠️ GANTI INI DENGAN databaseURL KAMU DARI FIREBASE CONSOLE
const firebaseConfig = {
  apiKey: "AIzaSyCt5eEVB0T7JAJS0XxkKWCypJ923Lbsfc8",
  authDomain: "tebak-kata-reborn.firebaseapp.com",
  databaseURL: "https://tebak-kata-reborn-default-rtdb.firebaseio.com", // <-- WAJIB ISI INI
  projectId: "tebak-kata-reborn",
  storageBucket: "tebak-kata-reborn.firebasestorage.app",
  messagingSenderId: "341111815240",
  appId: "1:341111815240:web:7db8309e4d5d2b433fac7d"
};

try {
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.db = db;
  window.ref = ref;
  window.set = set;
  window.get = get;
  window.onValue = onValue;
  window.update = update;
  window.remove = remove;
  window.serverTimestamp = serverTimestamp;
  console.log("✅ Firebase connected!");
} catch(e) {
  console.error("❌ Firebase error:", e);
  alert("Firebase gagal konek: " + e.message + "\n\nCek databaseURL dan rules Firebase");
}
</script>
<style>
:root{
  --neon-purple:#8B5CF6;
  --neon-pink:#EC4899;
  --neon-cyan:#06B6D4;
  --neon-green:#10B981;
  --bg-dark:#050816;
  --glass:rgba(139,92,246,0.1);
  --text:#F8FAFC;
  --text-dim:#94A3B8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{
  background:var(--bg-dark);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.container{width:100%;max-width:480px}

.logo{
  font-family:'Orbitron';font-size:38px;font-weight:900;
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink),var(--neon-cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;margin-bottom:8px;
}

.subtitle{
  color:var(--text-dim);text-align:center;margin-bottom:30px;
  font-size:13px;text-transform:uppercase;letter-spacing:3px;
}

.glass-card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid rgba(139,92,246,0.3);
  border-radius:28px;
  padding:30px;
  box-shadow:0 0 50px rgba(139,92,246,0.2);
}

.input-group{margin-bottom:20px}
.input-group label{
  font-size:11px;color:var(--neon-cyan);margin-bottom:8px;
  display:block;text-transform:uppercase;letter-spacing:1px;font-weight:600
}

.input-group input{
  width:100%;padding:16px;border-radius:14px;
  border:2px solid rgba(139,92,246,0.3);
  background:rgba(5,8,22,0.6);
  color:var(--text);font-size:16px;outline:none;
  text-transform:uppercase;font-family:'Orbitron';
}

.input-group input:focus{
  border-color:var(--neon-purple);
  box-shadow:0 0 20px rgba(139,92,246,0.5);
}

.btn{
  width:100%;padding:18px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));
  color:white;font-weight:700;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Orbitron';margin-bottom:10px;
  transition:all 0.3s;
}

.btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(139,92,246,0.7)}
.btn:active{transform:scale(0.98)}
.btn-outline{
  background:transparent;
  border:2px solid var(--neon-purple);
}

.btn-quick{
  background:linear-gradient(135deg,var(--neon-cyan),var(--neon-green));
}

.divider{
  display:flex;align-items:center;margin:25px 0;
  color:var(--text-dim);font-size:11px;text-transform:uppercase;
  letter-spacing:2px
}

.divider::before,.divider::after{
  content:'';flex:1;height:2px;
  background:linear-gradient(90deg, transparent, var(--neon-purple), transparent);
  margin:0 15px
}

.room-code{
  font-family:'Orbitron';font-size:42px;font-weight:900;letter-spacing:12px;
  background:linear-gradient(135deg,var(--neon-cyan),var(--neon-green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;margin:25px 0;
}

.waiting{text-align:center;padding:40px}
.waiting h3{
  font-family:'Orbitron';font-size:20px;margin-bottom:15px;color:var(--neon-cyan);
}

.room-list{
  max-height:280px;
  overflow-y:auto;
  padding-right:5px;
}

.room-item{
  background:rgba(139,92,246,0.1);
  border:1px solid rgba(139,92,246,0.3);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:all 0.3s;
}

.room-item:hover{
  background:rgba(139,92,246,0.2);
  border-color:var(--neon-purple);
}

.room-item.full{
  opacity:0.5;
  cursor:not-allowed;
}

.room-id{
  font-family:'Orbitron';font-size:16px;font-weight:700;
  letter-spacing:2px;
}

.room-status{
  padding:6px 12px;
  border-radius:20px;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  font-family:'Orbitron';
}

.status-available{
  background:rgba(16,185,129,0.2);
  color:var(--neon-green);
  border:1px solid var(--neon-green);
}

.status-full{
  background:rgba(239,68,68,0.2);
  color:#EF4444;
  border:1px solid #EF4444;
}

.no-room{
  text-align:center;padding:40px 20px;color:var(--text-dim);
  font-size:13px;
}

.toast{
  position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-120px);
  background:linear-gradient(135deg,var(--neon-green),#059669);
  color:white;padding:16px 24px;border-radius:14px;
  font-size:14px;font-weight:600;opacity:0;transition:all 0.4s;
  z-index:2000;display:flex;align-items:center;gap:10px;
  font-family:'Orbitron';
}

.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.error{background:linear-gradient(135deg,#EF4444,#DC2626)}
</style>
</head>
<body>

<div class="container">

  <div id="screen-menu">
    <div class="logo">TEBAK KATA</div>
    <div class="subtitle">Online Multiplayer Arena</div>

    <div class="glass-card">
      <div class="input-group">
        <label>Nickname Player</label>
        <input type="text" id="inputNama" placeholder="ENTER NAME" maxlength="12">
      </div>

      <button class="btn" id="btnCreate">
        ⚡ Create Room
      </button>

      <button class="btn btn-quick" id="btnQuick">
        🚀 Quick Match
      </button>

      <div class="divider">Available Rooms</div>

      <div class="room-list" id="roomList">
        <div class="no-room">Loading rooms...</div>
      </div>

      <div class="divider">Or Join by Code</div>

      <div class="input-group">
        <label>Room Code</label>
        <input type="text" id="inputKode" placeholder="ABC123" maxlength="6">
      </div>

      <button class="btn btn-outline" id="btnJoin">
        🔑 Join Room
      </button>
    </div>
  </div>

  <div id="screen-lobby" style="display:none">
    <div class="glass-card waiting">
      <h3>Waiting For Opponent...</h3>
      <div class="room-code" id="roomCode">------</div>
      <div style="color:var(--text-dim);font-size:13px;margin-bottom:25px;text-transform:uppercase">
        Share this code with your friend
      </div>
      <div style="color:var(--neon-pink);font-size:18px;font-family:'Orbitron'">Searching...</div>

      <button class="btn btn-outline" id="btnCancel" style="margin-top:35px">
        ❌ Cancel
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"><span id="toastText"></span></div>

<script>
let namaPlayer = '';
let roomId = '';
let unsubscribe = null;
let roomsUnsubscribe = null;

document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('btnCreate').addEventListener('click', buatRoom);
  document.getElementById('btnQuick').addEventListener('click', autoJoin);
  document.getElementById('btnJoin').addEventListener('click', joinRoom);
  document.getElementById('btnCancel').addEventListener('click', batalRoom);
  lucide.createIcons();
  loadRooms();
});

function loadRooms(){
  if(roomsUnsubscribe) roomsUnsubscribe();

  console.log("Loading rooms from Firebase...");
  const roomsRef = ref(db, 'rooms');
  roomsUnsubscribe = onValue(roomsRef, (snapshot)=>{
    console.log("Rooms snapshot:", snapshot.exists());
    const roomListEl = document.getElementById('roomList');
    roomListEl.innerHTML = '';

    if(!snapshot.exists()){
      roomListEl.innerHTML = `<div class="no-room">No rooms available<br>Create one!</div>`;
      return;
    }

    const rooms = snapshot.val();
    let hasRoom = false;

    Object.keys(rooms).forEach(id=>{
      const room = rooms[id];
      const isFull = room.player2 && room.status!== 'waiting';
      const isWaiting = room.status === 'waiting' &&!room.player2;

      if(isWaiting || isFull){
        hasRoom = true;
        const roomItem = document.createElement('div');
        roomItem.className = 'room-item' + (isFull? ' full' : '');

        roomItem.innerHTML = `
          <div>
            <div class="room-id">${id}</div>
            <div style="font-size:12px;color:var(--text-dim)">Host: ${room.player1.nama}</div>
          </div>
          <div class="room-status ${isFull? 'status-full' : 'status-available'}">
            ${isFull? 'FULL' : 'OPEN'}
          </div>
        `;

        if(!isFull){
          roomItem.onclick = ()=>quickJoin(id);
        }

        roomListEl.appendChild(roomItem);
      }
    });

    if(!hasRoom){
      roomListEl.innerHTML = `<div class="no-room">No open rooms<br>Create one!</div>`;
    }
  }, (error)=>{
    console.error("Load rooms error:", error);
    document.getElementById('roomList').innerHTML = `<div class="no-room">Error loading rooms<br>${error.message}</div>`;
  });
}

window.quickJoin = async function(targetRoomId){
  try {
    namaPlayer = document.getElementById('inputNama').value.trim();
    if(!namaPlayer){
      showToast('Enter nickname first!', 'error');
      return;
    }

    console.log("Quick joining room:", targetRoomId);
    roomId = targetRoomId;
    const roomRef = ref(db, 'rooms/' + roomId);
    const snapshot = await get(roomRef);

    if(!snapshot.exists()){
      showToast('Room deleted!', 'error');
      loadRooms();
      return;
    }

    const data = snapshot.val();
    if(data.player2){
      showToast('Room is full!', 'error');
      loadRooms();
      return;
    }

    await update(roomRef, {
      player2: {nama: namaPlayer, score: 0, ready: true},
      status: 'ready'
    });

    localStorage.setItem('namaPlayer', namaPlayer);
    localStorage.setItem('roomId', roomId);
    localStorage.setItem('playerNum', '2');

    showToast('Joined Room!', 'success');
    setTimeout(()=>masukGame(), 1500);
  } catch(e) {
    console.error("Quick join error:", e);
    showToast("Error: " + e.message, 'error');
  }
}

window.buatRoom = async function(){
  try {
    namaPlayer = document.getElementById('inputNama').value.trim();
    if(!namaPlayer){
      showToast('Enter nickname first!', 'error');
      return;
    }

    console.log("Creating room...");
    roomId = Math.random().toString(36).substring(2,8).toUpperCase();
    const roomRef = ref(db, 'rooms/' + roomId);

    await set(roomRef, {
      player1: {nama: namaPlayer, score: 0, ready: true},
      player2: null,
      status: 'waiting',
      createdAt: serverTimestamp(),
      babak: 0,
      giliran: 1
    });

    console.log("Room created:", roomId);
    localStorage.setItem('namaPlayer', namaPlayer);
    localStorage.setItem('roomId', roomId);
    localStorage.setItem('playerNum', '1');

    document.getElementById('roomCode').textContent = roomId;
    showScreen('screen-lobby');
    showToast('Room Created!', 'success');

    listenRoom();
  } catch(e) {
    console.error("Create room error:", e);
    showToast("Error: " + e.message, 'error');
  }
}

window.joinRoom = async function(){
  try {
    namaPlayer = document.getElementById('inputNama').value.trim();
    roomId = document.getElementById('inputKode').value.trim().toUpperCase();

    if(!namaPlayer){
      showToast('Enter nickname first!', 'error');
      return;
    }
    if(!roomId || roomId.length<6){
      showToast('Enter 6 digit room code!', 'error');
      return;
    }

    console.log("Joining room:", roomId);
    const roomRef = ref(db, 'rooms/' + roomId);
    const snapshot = await get(roomRef);

    if(!snapshot.exists()){
      showToast('Room not found!', 'error');
      return;
    }

    const data = snapshot.val();

    if(data.player2){
      showToast('Room is full!', 'error');
      return;
    }

    await update(roomRef, {
      player2: {nama: namaPlayer, score: 0, ready: true},
      status: 'ready'
    });

    localStorage.setItem('namaPlayer', namaPlayer);
    localStorage.setItem('roomId', roomId);
    localStorage.setItem('playerNum', '2');

    showToast('Joined Room!', 'success');
    setTimeout(()=>masukGame(), 1500);
  } catch(e) {
    console.error("Join room error:", e);
    showToast("Error: " + e.message, 'error');
  }
}

window.autoJoin = async function(){
  try {
    namaPlayer = document.getElementById('inputNama').value.trim();
    if(!namaPlayer){
      showToast('Enter nickname first!', 'error');
      return;
    }

    showToast('Searching room...', 'success');
    console.log("Auto joining...");

    const roomsRef = ref(db, 'rooms');
    const snapshot = await get(roomsRef);

    if(!snapshot.exists()){
      showToast('No room available', 'error');
      return;
    }

    const rooms = snapshot.val();
    let foundRoom = null;

    for(let id in rooms){
      if(rooms[id].status === 'waiting' &&!rooms[id].player2){
        foundRoom = id;
        break;
      }
    }

    if(!foundRoom){
      showToast('No room found. Create one!', 'error');
      return;
    }

    quickJoin(foundRoom);
  } catch(e) {
    console.error("Auto join error:", e);
    showToast("Error: " + e.message, 'error');
  }
}

function listenRoom(){
  console.log("Listening room:", roomId);
  const roomRef = ref(db, 'rooms/' + roomId);
  unsubscribe = onValue(roomRef, (snapshot)=>{
    if(!snapshot.exists()){
      showToast('Room deleted!', 'error');
      batalRoom();
      return;
    }

    const data = snapshot.val();
    console.log("Room data:", data.status);
    if(data.status === 'ready' && data.player1 && data.player2){
      setTimeout(()=>masukGame(), 1500);
    }
  }, (error)=>{
    console.error("Listen room error:", error);
    showToast("Connection error: " + error.message, 'error');
  });
}

function masukGame(){
  console.log("Redirecting to game.html?room=" + roomId);
  if(unsubscribe) unsubscribe();
  if(roomsUnsubscribe) roomsUnsubscribe();
  window.location.href = `./game.html?room=${roomId}`;
}

window.batalRoom = async function(){
  try {
    if(unsubscribe) unsubscribe();
    if(roomId && localStorage.getItem('playerNum')==='1'){
      await remove(ref(db, 'rooms/' + roomId));
    }
    localStorage.clear();
    showScreen('screen-menu');
    document.getElementById('inputKode').value = '';
    showToast('Left room', 'success');
    loadRooms();
  } catch(e) {
    console.error("Cancel room error:", e);
  }
}

function showScreen(id){
  document.getElementById('screen-menu').style.display = id==='screen-menu'?'block':'none';
  document.getElementById('screen-lobby').style.display = id==='screen-lobby'?'block':'none';
}

function showToast(msg, type='success'){
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  toast.className = 'toast' + (type==='error'?' error':'') + ' show';
  setTimeout(()=>toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
