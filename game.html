<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tebak Kata Reborn - Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.300.0/dist/umd/lucide.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCt5eEVB0T7JAJS0XxkKWCypJ923Lbsfc8",
  authDomain: "tebak-kata-reborn.firebaseapp.com",
  databaseURL: "https://tebak-kata-reborn-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tebak-kata-reborn",
  storageBucket: "tebak-kata-reborn.firebasestorage.app",
  messagingSenderId: "341111815240",
  appId: "1:341111815240:web:7db8309e4d5d2b433fac7d"
};

let db;
try {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app, firebaseConfig.databaseURL);
  window.db = db;
  window.ref = ref;
  window.set = set;
  window.get = get;
  window.onValue = onValue;
  window.update = update;
  window.remove = remove;
  window.serverTimestamp = serverTimestamp;
  window.onDisconnect = onDisconnect;
  console.log("✅ Game Firebase connected!");
} catch(e) {
  console.error("❌ Game Firebase error:", e);
  document.getElementById('loading').innerHTML = `<div style="color:#EF4444">Firebase Error: ${e.message}</div>`;
}
</script>
<style>
:root{
  --neon-purple:#8B5CF6;
  --neon-pink:#EC4899;
  --neon-cyan:#06B6D4;
  --neon-green:#10B981;
  --bg-dark:#050816;
  --glass:rgba(139,92,246,0.1);
  --text:#F8FAFC;
  --text-dim:#94A3B8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{
  background:var(--bg-dark);
  color:var(--text);
  min-height:100vh;
  padding:20px;
}

.container{max-width:500px;margin:0 auto}

.header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;
  padding:15px 20px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid rgba(139,92,246,0.3);
  border-radius:20px;
}

.logo-text{
  font-family:'Orbitron';font-size:16px;font-weight:700;
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.room-code{
  font-family:'Orbitron';font-size:11px;color:var(--neon-cyan);
  background:rgba(6,182,212,0.2);
  padding:6px 12px;border-radius:20px;
  border:1px solid rgba(6,182,212,0.5);
}

.score-board{
  display:flex;gap:15px;margin-bottom:25px
}

.score-card{
  flex:1;padding:18px;border-radius:20px;text-align:center;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:2px solid rgba(139,92,246,0.2);
}

.score-card.active{
  border-color:var(--neon-purple);
  box-shadow:0 0 30px rgba(139,92,246,0.5);
}

.score-value{
  font-size:36px;font-weight:900;font-family:'Orbitron';
  color:var(--neon-cyan);
}

.timer{
  text-align:center;font-size:56px;font-weight:900;font-family:'Orbitron';
  margin:25px 0;color:var(--neon-pink);
}

.glass-card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:2px solid rgba(139,92,246,0.3);
  border-radius:28px;
  padding:35px;
  min-height:220px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.card-kategori{
  font-size:12px;color:var(--neon-cyan);font-weight:700;
  background:rgba(6,182,212,0.2);
  padding:8px 16px;border-radius:20px;
  display:inline-block;margin:0 auto 20px;
  font-family:'Orbitron';
}

.card-hint{
  font-size:38px;font-weight:900;font-family:'Orbitron';
  letter-spacing:8px;margin:20px 0;text-align:center;
  color:var(--text);
}

.btn{
  width:100%;padding:18px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));
  color:white;font-weight:700;font-size:16px;cursor:pointer;
  font-family:'Orbitron';margin-bottom:10px;
}

.loading{
  text-align:center;padding:120px 20px;color:var(--text-dim);
  font-family:'Orbitron';
}

.toast{
  position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-120px);
  background:linear-gradient(135deg,#EF4444,#DC2626);
  color:white;padding:16px 24px;border-radius:14px;
  font-size:14px;font-weight:600;opacity:0;transition:all 0.4s;
  z-index:2000;font-family:'Orbitron';
}

.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="container" id="gameContainer" style="display:none">
  <div class="header">
    <div class="logo-text">⚡ TEBAK KATA ARENA</div>
    <div class="room-code" id="roomCodeDisplay">ROOM: ----</div>
  </div>

  <div class="score-board">
    <div class="score-card" id="scoreCard1">
      <div style="font-size:11px;color:var(--text-dim)">PLAYER 1</div>
      <div class="score-value" id="score1">0</div>
    </div>
    <div class="score-card" id="scoreCard2">
      <div style="font-size:11px;color:var(--text-dim)">PLAYER 2</div>
      <div class="score-value" id="score2">0</div>
    </div>
  </div>

  <div class="timer" id="timer">02:00</div>

  <div class="glass-card">
    <div class="card-kategori" id="cardKategori">KATEGORI</div>
    <div class="card-hint" id="cardHint">WAITING...</div>
  </div>

  <div id="areaPengambil">
    <button class="btn" onclick="ambilKartu()">🎲 Draw Card</button>
  </div>

  <div id="areaPenebak" style="display:none">
    <input type="text" id="inputJawab" placeholder="TYPE ANSWER..." style="width:100%;padding:18px;border-radius:16px;border:2px solid rgba(139,92,246,0.3);background:rgba(5,8,22,0.8);color:var(--text);font-size:20px;text-align:center;margin-bottom:15px;text-transform:uppercase;font-family:'Orbitron'">
    <button class="btn" onclick="submitJawaban()">Submit</button>
  </div>

  <button class="btn" style="background:rgba(239,68,68,0.3);border:1px solid #EF4444;margin-top:20px" onclick="keluarRoom()">❌ Leave Room</button>
</div>

<div class="loading" id="loading">
  Connecting to Arena...
</div>

<div class="toast" id="toast"><span id="toastText"></span></div>

<script>
lucide.createIcons();

const urlParams = new URLSearchParams(window.location.search);
const roomId = urlParams.get('room');
const namaPlayer = localStorage.getItem('namaPlayer');
const playerNum = localStorage.getItem('playerNum');

let roomData = null;
let unsubscribe = null;
let playerRef = null;

if(!roomId ||!namaPlayer){
  showToast("Invalid room! Back to lobby", "error");
  setTimeout(()=>window.location.href = './index.html', 2000);
}

const roomRef = ref(db, 'rooms/' + roomId);
playerRef = ref(db, 'rooms/' + roomId + '/player' + playerNum);

// ON DISCONNECT: auto set null kalo player close tab/koneksi putus
onDisconnect(playerRef).set(null);

// ON DISCONNECT ROOM: auto delete room kalo player 1 keluar
if(playerNum === '1'){
  onDisconnect(roomRef).remove();
}

unsubscribe = onValue(roomRef, (snapshot)=>{
  if(!snapshot.exists()){
    showToast("Room deleted!", "error");
    setTimeout(()=>window.location.href = './index.html', 2000);
    return;
  }

  roomData = snapshot.val();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'block';

  document.getElementById('roomCodeDisplay').textContent = 'ROOM: ' + roomId;
  document.getElementById('score1').textContent = roomData.player1.score || 0;
  document.getElementById('score2').textContent = roomData.player2? roomData.player2.score : 0;

  // AUTO DELETE: kalo gak ada player sama sekali
  if(!roomData.player1 &&!roomData.player2){
    remove(roomRef);
    showToast("Room empty, deleted!", "error");
    setTimeout(()=>window.location.href = './index.html', 2000);
    return;
  }

  // AUTO DELETE: kalo player 1 keluar, room ikut kehapus
  if(!roomData.player1 && playerNum === '2'){
    showToast("Host left! Room closed", "error");
    setTimeout(()=>window.location.href = './index.html', 2000);
    return;
  }

  const giliran = roomData.giliran || 1;
  document.getElementById('scoreCard1').classList.toggle('active', giliran===1);
  document.getElementById('scoreCard2').classList.toggle('active', giliran===2);

  const isPengambil = (giliran===1 && playerNum==='1') || (giliran===2 && playerNum==='2');
  document.getElementById('areaPengambil').style.display = isPengambil? 'block' : 'none';
  document.getElementById('areaPenebak').style.display =!isPengambil? 'block' : 'none';

  if(roomData.currentCard){
    document.getElementById('cardKategori').textContent = roomData.currentCard.kategori;
    document.getElementById('cardHint').textContent = roomData.currentCard.hint;
  }
}, (error)=>{
  console.error("Game onValue error:", error);
  document.getElementById('loading').innerHTML = `<div style="color:#EF4444">Error: ${error.message}</div>`;
});

window.ambilKartu = async function(){
  const kartu = [
    {kategori:"FRUIT", jawaban:"JERUK", hint:"J _ K"},
    {kategori:"CITY", jawaban:"JAKARTA", hint:"J _ K _ T _"},
    {kategori:"ANIMAL", jawaban:"MACAN", hint:"M _ C _ N"}
  ];
  const card = kartu[Math.floor(Math.random()*kartu.length)];

  await update(roomRef, {
    currentCard: card,
    status: 'playing',
    timerStart: Date.now()
  });
}

window.submitJawaban = async function(){
  const jawaban = document.getElementById('inputJawab').value.trim().toUpperCase();
  if(jawaban === roomData.currentCard.jawaban){
    const scoreKey = playerNum==='1'? 'player1/score' : 'player2/score';
    await update(roomRef, {
      [scoreKey]: (roomData['player'+playerNum].score||0) + 15,
      currentCard: null,
      status: 'waiting'
    });
    showToast("+15 Points!", "success");
  } else {
    showToast("Wrong answer!", "error");
  }
  document.getElementById('inputJawab').value = '';
}

window.keluarRoom = async function(){
  if(playerNum === '1'){
    // Host keluar = room langsung kehapus
    await remove(roomRef);
  } else {
    // Player 2 keluar = set null aja
    await set(playerRef, null);
  }
  localStorage.clear();
  window.location.href = './index.html';
}

// Deteksi close tab/browser
window.addEventListener('beforeunload', ()=>{
  if(playerNum === '1'){
    remove(roomRef);
  } else {
    set(playerRef, null);
  }
});

function showToast(msg, type='error'){
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  toast.className = 'toast show';
  setTimeout(()=>toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
