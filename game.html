:root{

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{

}

body::before{

}

@keyframes rotateBg{

}

.container{max-width:500px;margin:0 auto;z-index:1}

.header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;
  padding:15px 20px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid rgba(139,92,246,0.3);
  border-radius:20px;
  box-shadow:0 0 30px rgba(139,92,246,0.2);
}

.logo-text{
  font-family:'Orbitron';font-size:16px;font-weight:700;
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

.room-code{
  font-family:'Orbitron';font-size:11px;color:var(--neon-cyan);
  background:rgba(6,182,212,0.2);

}

.babak-info{

  margin-bottom:15px;text-transform:uppercase;letter-spacing:2px;
  font-family:'Orbitron';
}

.score-board{
  display:flex;gap:15px;margin-bottom:25px
}

.score-card{
  flex:1;padding:18px;border-radius:20px;text-align:center;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:2px solid rgba(139,92,246,0.2);
  transition:all 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);
  position:relative;
  overflow:hidden;
}

.score-card::before{
  content:'';
  position:absolute;
  top:-2px;left:-2px;right:-2px;bottom:-2px;
  background:linear-gradient(45deg,var(--neon-purple),var(--neon-pink),var(--neon-cyan));
  border-radius:20px;
  opacity:0;
  z-index:-1;
  transition:opacity 0.4s;
}

.score-card.active{
  transform:scale(1.08);
  border-color:transparent;
}

.score-card.active::before{
  opacity:1;
  animation:borderGlow 2s linear infinite;
}

@keyframes borderGlow{
 0%{filter:hue-rotate(0deg)}
 100%{filter:hue-rotate(360deg)}
}

.score-name{
  font-size:11px;color:var(--text-dim);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:1px;
}

.score-value{
  font-size:36px;font-weight:900;font-family:'Orbitron';

}

.timer{

}

}

.timer.warning{

}

@keyframes blink{
 0%,50%,100%{opacity:1}

.glass-card{

.glass-card.show{

.card-kategori{

.card-hint{

.card-jawaban{

.input-jawab{

.btn{

.btn-success{

.btn-leave{

.popup{

.popup.show{transform:translate(-50%,-50%) scale(1)}
.popup-icon{font-size:70px;margin-bottom:20px;animation:iconBounce 0.6s}
.popup-title{

.popup-text{color:var(--text-dim);margin-bottom:25px;font-size:15px}

@keyframes iconBounce{
 0%{transform:scale(0) rotate(180deg)}
 50%{transform:scale(1.3) rotate(-10deg)}
 100%{transform:scale(1) rotate(0deg)}
}

.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);
  z-index:999;display:none
}
.overlay.show{display:block}

.points-popup{
  position:fixed;top:25%;left:50%;transform:translateX(-50%) translateY(-60px);
  font-size:56px;font-weight:900;font-family:'Orbitron';
  opacity:0;transition:all 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);
  z-index:1001;pointer-events:none;

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 30px rgba(16,185,129,0.8);

.points-popup.show{
  transform:translateX(-50%) translateY(0);

.loading{

  font-family:'Orbitron';

.loading i{
  font-size:40px;color:var(--neon-purple);

@keyframes spin{
 100%{transform:rotate(360deg)}
}
</style>
</head>

  document.getElementById('gameContainer').style.display = 'block';

  // Auto delete logic
  if(!roomData.player1 &&!roomData.player2){
    remove(roomRef);
    showPopup("🏠 Room Empty", "Room deleted automatically", 2000);
    setTimeout(()=>window.location.href = './index.html', 2000);
    return;
  }
  if(!roomData.player1 && playerNum === '2'){
    showPopup("👋 Host Left", "Host disconnected. Room closed", 2000);
    setTimeout(()=>window.location.href = './index.html', 2000);
    return;
  }

  updateUI();
}, (error)=>{
  console.error("Game onValue error:", error);
  document.getElementById('loading').innerHTML = `<div style="color:#EF4444">Error: ${error.message}<br>Check Firebase Rules!</div>`;
});

function updateUI(){
  document.getElementById('roomCodeDisplay').textContent = 'ROOM: ' + roomId;
  document.getElementById('scoreName1').textContent = roomData.player1.nama.toUpperCase();
  document.getElementById('scoreName2').textContent = roomData.player2? roomData.player2.nama.toUpperCase() : 'WAITING...';
  document.getElementById('score1').textContent = roomData.player1.score || 0;
  document.getElementById('score2').textContent = roomData.player2? roomData.player2.score : 0;
  document.getElementById('babakNow').textContent = roomData.babak || 1;

  const giliran = roomData.giliran || 1;
  document.getElementById('scoreCard1').classList.toggle('active', giliran===1);
  document.getElementById('scoreCard2').classList.toggle('active', giliran===2);

  const isPengambil = (giliran===1 && playerNum==='1') || (giliran===2 && playerNum==='2');
  document.getElementById('areaPengambil').style.display = isPengambil? 'block' : 'none';
  document.getElementById('areaPenebak').style.display =!isPengambil? 'block' : 'none';

  if(roomData.currentCard){
    currentCard = roomData.currentCard;
    document.getElementById('cardKategori').textContent = currentCard.kategori;
    document.getElementById('cardHint').textContent = currentCard.hint;
    document.getElementById('cardJawaban').textContent = currentCard.jawaban;
    document.getElementById('cardJawaban').style.display = roomData.showAnswer? 'block' : 'none';
    document.getElementById('card').classList.add('show');
  } else {
    document.getElementById('card').classList.remove('show');
  }

  if(roomData.timerStart && roomData.status==='playing'){
    const elapsed = Math.floor((Date.now() - roomData.timerStart)/1000);
    timer = Math.max(0, 120 - elapsed);
    updateTimer();
    if(timer>0 &&!timerInterval){
      timerInterval = setInterval(()=>{
        timer--;
        updateTimer();
        if(timer<=0){
          clearInterval(timerInterval);
          timerInterval = null;
          if(isPengambil) timeUp();
        }
      }, 1000);
    }
  }

  if(roomData.status==='finished'){
    const winner = roomData.player1.score>roomData.player2.score? roomData.player1.nama : roomData.player2.score>roomData.player1.score? roomData.player2.nama : 'DRAW';
    showPopup('🏆 GAME OVER!', winner==='DRAW'? `Score: ${roomData.player1.score} - ${roomData.player2.score}` : `Winner: ${winner}`, 5000);
  }
}

window.ambilKartu = async function(){
  const giliran = roomData.giliran || 1;
  const isPengambil = (giliran===1 && playerNum==='1') || (giliran===2 && playerNum==='2');
  if(!isPengambil) return;

  const card = kartu[Math.floor(Math.random()*kartu.length)];
  currentCard = card;

  await update(roomRef, {
    currentCard: card,
    showAnswer: false,
    status: 'playing',
    timerStart: Date.now()
  });

  document.getElementById('areaPengambil').querySelector('button').disabled = true;
  showPopup('🔔 Your Turn!', `${giliran===1? roomData.player2.nama : roomData.player1.nama} is guessing...`, 2000);
}

function updateTimer(){
  const min = String(Math.floor(timer/60)).padStart(2,'0');
  const sec = String(timer%60).padStart(2,'0');
  const timerEl = document.getElementById('timer');
  timerEl.textContent = `${min}:${sec}`;
  timerEl.classList.toggle('warning', timer<=10);
}

window.submitJawaban = async function(){
  const isPengambil = (roomData.giliran===1 && playerNum==='1') || (roomData.giliran===2 && playerNum==='2');
  if(isPengambil) return;

  const jawaban = document.getElementById('inputJawab').value.trim().toUpperCase();
  clearInterval(timerInterval);
  timerInterval = null;

  let updateData = {
    showAnswer: true,
    status: 'waiting'
  };

  if(jawaban === currentCard.jawaban){
    if(roomData.giliran===2) updateData['player2/score'] = (roomData.player2.score||0) + 15;
    else updateData['player1/score'] = (roomData.player1.score||0) + 15;
    
    if(roomData.giliran===1) updateData['player1/score'] = (roomData.player1.score||0) + 5;
    else updateData['player2/score'] = (roomData.player2.score||0) + 5;
    
    showPointsPopup('+15', roomData.giliran===2? 2 : 1);
    showPopup('🎉 CORRECT!', `${roomData.giliran===1? roomData.player2.nama : roomData.player1.nama} got +15 points!`, 2500);
  } else {
    if(roomData.giliran===1) updateData['player1/score'] = (roomData.player1.score||0) + 5;
    else updateData['player2/score'] = (roomData.player2.score||0) + 5;
    
    showPointsPopup('+5', roomData.giliran===1? 1 : 2);
    showPopup('❌ WRONG!', `Answer: ${currentCard.jawaban}`, 2500);
  }

  await update(roomRef, updateData);
  document.getElementById('inputJawab').value = '';
}

async function timeUp(){
  clearInterval(timerInterval);
  timerInterval = null;
  let updateData = {
    showAnswer: true,
    status: 'waiting'
  };
  if(roomData.giliran===1) updateData['player1/score'] = (roomData.player1.score||0) + 5;
  else updateData['player2/score'] = (roomData.player2.score||0) + 5;
  
  await update(roomRef, updateData);
  showPointsPopup('+5', roomData.giliran===1? 1 : 2);
  showPopup('⏰ TIME UP!', `Answer: ${currentCard.jawaban}`, 2500);
}

window.lewatiBabak = async function(){
  const isPengambil = (roomData.giliran===1 && playerNum==='1') || (roomData.giliran===2 && playerNum==='2');
  if(!isPengambil) return;

  clearInterval(timerInterval);
  timerInterval = null;
  let updateData = {
    showAnswer: true,
    status: 'waiting'
  };
  if(roomData.giliran===1) updateData['player1/score'] = (roomData.player1.score||0) + 5;
  else updateData['player2/score'] = (roomData.player2.score||0) + 5;
  
  await update(roomRef, updateData);
  showPopup('⏭️ SKIPPED!', `Answer: ${currentCard.jawaban}`, 2500);
  }
  
  window.nextBabak = async function(){
  closePopup();
  const babakBaru = (roomData.babak || 1) + 1;
  const giliranBaru = roomData.giliran === 1 ? 2 : 1;
  
  if(babakBaru > 10){
  await update(roomRef, { status: 'finished' });
  return;
  }
  
  await update(roomRef, {
  babak: babakBaru,
  giliran: giliranBaru,
  currentCard: null,
  showAnswer: false,
  status: 'waiting',
  timerStart: null
  });
  
  document.getElementById('areaPengambil').querySelector('button').disabled = false;
  timer = 120;
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  }
  
  function showPopup(icon, title, text, duration=3000){
  document.getElementById('popupIcon').textContent = icon;
  document.getElementById('popupTitle').textContent = title;
  document.getElementById('popupText').textContent = text;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('popup').classList.add('show');
  setTimeout(closePopup, duration);
  }
  
  function closePopup(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('popup').classList.remove('show');
  }
  
  function showPointsPopup(text, player){
  const popup = document.getElementById('pointsPopup');
  popup.textContent = text;
  popup.classList.add('show');
  setTimeout(()=>popup.classList.remove('show'), 1000);
  }
  
  window.keluarRoom = async function(){
  if(confirm('Leave room?')){
  if(playerNum === '1'){
  await remove(roomRef);
  } else {
  await set(playerRef, null);
  }
  localStorage.clear();
  window.location.href = './index.html';
  }
  }
  
  window.addEventListener('beforeunload', ()=>{
  if(playerNum === '1'){
  remove(roomRef);
  } else {
  set(playerRef, null);
  }
  });
  
  // Enter to submit
  document.getElementById('inputJawab')?.addEventListener('keypress', (e)=>{
  if(e.key === 'Enter') submitJawaban();
  });
  </script>
  </body>
