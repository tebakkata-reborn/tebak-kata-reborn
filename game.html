<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tebak Kata Reborn - Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.300.0/dist/umd/lucide.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCt5eEVB0T7JAJS0XxkKWCypJ923Lbsfc8",
  authDomain: "tebak-kata-reborn.firebaseapp.com",
  databaseURL: "https://tebak-kata-reborn-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tebak-kata-reborn",
  storageBucket: "tebak-kata-reborn.firebasestorage.app",
  messagingSenderId: "341111815240",
  appId: "1:341111815240:web:7db8309e4d5d2b433fac7d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>
<style>
:root{
  --neon-purple:#8B5CF6;--neon-pink:#EC4899;--neon-cyan:#06B6D4;
  --neon-green:#10B981;--neon-red:#EF4444;--bg-dark:#050816;
  --glass:rgba(139,92,246,0.1);--text:#F8FAFC;--text-dim:#94A3B8;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg-dark);color:var(--text);min-height:100vh;padding:20px}
.container{max-width:500px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;padding:15px 20px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(139,92,246,0.3);border-radius:20px}
.logo-text{font-family:'Orbitron';font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.room-code{font-family:'Orbitron';font-size:11px;color:var(--neon-cyan);background:rgba(6,182,212,0.2);padding:6px 12px;border-radius:20px;border:1px solid rgba(6,182,212,0.5)}
.loading{text-align:center;padding:60px 20px;color:var(--text-dim);font-family:'Orbitron'}
.loading i{font-size:40px;color:var(--neon-purple);animation:spin 2s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
.error-box{background:rgba(239,68,68,0.2);border:2px solid var(--neon-red);border-radius:16px;padding:20px;margin-top:20px;text-align:left;font-size:12px;font-family:monospace}
.btn{width:100%;padding:18px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));color:white;font-weight:700;font-size:16px;cursor:pointer;font-family:'Orbitron';margin-top:15px}
</style>
</head>
<body>

<div class="container" id="gameContainer" style="display:none">
  <!-- ISI GAME KAMU TARO SINI, SAMA KAYAK SEBELUMNYA -->
  <div class="header">
    <div class="logo-text">⚡ TEBAK KATA ARENA</div>
    <div class="room-code" id="roomCodeDisplay">ROOM: ----</div>
  </div>
  <div style="text-align:center;padding:100px">Game UI kamu taro di sini</div>
</div>

<div class="loading" id="loading">
  <i data-lucide="loader-2"></i>
  <div style="margin-top:20px">Connecting to Arena...</div>
  <div id="debugBox"></div>
</div>

<script>
lucide.createIcons();

const urlParams = new URLSearchParams(window.location.search);
let roomId = urlParams.get('room');
const namaPlayer = localStorage.getItem('namaPlayer');
let playerNum = localStorage.getItem('playerNum');

roomId = roomId ? roomId.toUpperCase() : null;

// TAMPILIN DEBUG DI LAYAR
document.getElementById('debugBox').innerHTML = `
  <div style="margin-top:15px;font-size:11px">
    Room: ${roomId}<br>
    Player: ${namaPlayer}<br>
    Num: ${playerNum}
  </div>
`;

if(!roomId ||!namaPlayer ||!playerNum){
  document.getElementById('loading').innerHTML = `
    <div style="color:#EF4444">Data Hilang!</div>
    <div class="error-box">Room: ${roomId}<br>Player: ${namaPlayer}<br>Num: ${playerNum}</div>
    <button class="btn" onclick="location.href='./index.html'">Back to Lobby</button>
  `;
}

// TEST 1: CEK KONEKSI FIREBASE
db.ref('.info/connected').on('value', (snap)=>{
  if(snap.val() === false){
    document.getElementById('debugBox').innerHTML += `<br><span style="color:#EF4444">Firebase OFFLINE</span>`;
  } else {
    document.getElementById('debugBox').innerHTML += `<br><span style="color:#10B981">Firebase ONLINE</span>`;
  }
});

// TIMEOUT 4 DETIK
let timeout = setTimeout(()=>{
  document.getElementById('debugBox').innerHTML += `
    <div class="error-box">
      TIMEOUT 4 DETIK!<br><br>
      Penyebab:<br>
      1. Rules Firebase belum Publish<br>
      2. Room ${roomId} udah kehapus<br>
      3. GitHub Pages HTTPS error<br><br>
      Solusi: Buka link ini di Chrome:<br>
      https://tebak-kata-reborn-default-rtdb.asia-southeast1.firebasedatabase.app/rooms/${roomId}.json
    </div>
    <button class="btn" onclick="location.href='./index.html'">Back</button>
  `;
}, 4000);

// TEST 2: GET DATA LANGSUNG
db.ref('rooms/' + roomId).once('value').then((snap)=>{
  clearTimeout(timeout);
  
  if(!snap.exists()){
    document.getElementById('loading').innerHTML = `
      <div style="color:#EF4444">Room Gak Ada!</div>
      <div class="error-box">Room ${roomId} tidak ditemukan di Firebase.<br>Udah ke-delete onDisconnect</div>
      <button class="btn" onclick="location.href='./index.html'">Back</button>
    `;
    return;
  }
  
  // KALO SAMPE SINI BERARTI SUKSES
  document.getElementById('loading').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'block';
  document.getElementById('roomCodeDisplay').textContent = 'ROOM: ' + roomId;
  
}).catch((err)=>{
  clearTimeout(timeout);
  document.getElementById('loading').innerHTML = `
    <div style="color:#EF4444">Firebase Error!</div>
    <div class="error-box">
      Code: ${err.code}<br>
      Message: ${err.message}<br><br>
      Kalo "permission_denied" = Rules belum true<br>
      Kalo "network_error" = Internet/Https error
    </div>
    <button class="btn" onclick="location.href='./index.html'">Back</button>
  `;
});
</script>
</body>
</html>
